<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🍄 贪吃蛇 MARIO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-center overflow-hidden select-none" id="app-body">
  
  <!-- 开始界面 -->
  <div id="start-screen" class="game-panel flex flex-col items-center justify-center gap-5 p-8 max-w-lg w-full mx-4 z-10">
    <!-- 街机装饰条 -->
    <div class="arcade-stripe w-full"></div>
    
    <div class="text-5xl mb-1 animate-bounce-slow">🍄</div>
    <h1 class="game-title text-center">贪吃蛇大作战</h1>
    <p class="game-subtitle text-base text-center tracking-wider">- SNAKE MARIO -</p>
    
    <div class="pixel-divider w-full"></div>

    <!-- 难度选择 -->
    <div class="w-full">
      <p class="text-center neon-text-cyan font-bold mb-3 text-base tracking-wider">🎮 选择难度</p>
      <div class="flex gap-3 justify-center flex-wrap">
        <button class="difficulty-btn active" data-speed="150" data-label="简单">
          <span class="diff-emoji">🌱</span>
          <span class="diff-text">简单</span>
        </button>
        <button class="difficulty-btn" data-speed="100" data-label="普通">
          <span class="diff-emoji">⚡</span>
          <span class="diff-text">普通</span>
        </button>
        <button class="difficulty-btn" data-speed="65" data-label="困难">
          <span class="diff-emoji">🔥</span>
          <span class="diff-text">困难</span>
        </button>
        <button class="difficulty-btn" data-speed="40" data-label="地狱">
          <span class="diff-emoji">💀</span>
          <span class="diff-text">地狱</span>
        </button>
      </div>
    </div>

    <!-- 音效开关 -->
    <div class="flex items-center gap-4">
      <label class="flex items-center gap-2 cursor-pointer sound-toggle">
        <input type="checkbox" id="sound-toggle" checked class="hidden">
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="text-sm" style="color: #FCFCFC;" id="sound-label">🔊 音效开启</span>
      </label>
    </div>

    <button id="start-btn" class="start-btn mt-2 px-10 py-4 text-lg font-bold shadow-lg">
      ▶ 开始游戏
    </button>

    <div class="text-sm text-center blink-text" style="color: #FAC000;">
      - PRESS START -
    </div>
    
    <div class="text-sm text-center" style="color: #E8A060;">
      ⌨️ 方向键/WASD · 📱 触屏滑动 · 空格暂停
    </div>
    
    <div class="arcade-stripe w-full"></div>
  </div>

  <!-- 游戏界面 -->
  <div id="game-screen" class="hidden flex flex-col items-center gap-3 w-full max-w-2xl mx-4 z-10">
    <!-- 顶部信息栏 -->
    <div class="game-hud w-full flex items-center justify-between px-4 py-3">
      <div class="flex items-center gap-2">
        <span class="text-lg">🪙</span>
        <span class="text-base font-bold" style="color: #FAC000;" id="score-display">0</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-base" id="difficulty-label" style="color: #00A800;">🌱 简单</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-lg">📏</span>
        <span class="text-base font-bold" style="color: #FCFCFC;" id="length-display">3</span>
      </div>
    </div>

    <!-- 游戏画布 -->
    <div class="canvas-wrapper overflow-hidden relative">
      <canvas id="game-canvas"></canvas>
      <!-- 暂停覆盖层 -->
      <div id="pause-overlay" class="hidden absolute inset-0 flex items-center justify-center z-20" style="background: rgba(92, 148, 252, 0.92);">
        <div class="text-center">
          <div class="text-5xl mb-4">⏸️</div>
          <p class="text-xl font-bold neon-text-green">已暂停</p>
          <p class="text-sm mt-3" style="color: #E8A060;">按空格键继续</p>
        </div>
      </div>
    </div>

    <!-- 底部控制栏 -->
    <div class="flex gap-3 w-full justify-center">
      <button id="pause-btn" class="control-btn px-5 py-2 font-bold text-base">⏸️ 暂停</button>
      <button id="restart-btn" class="control-btn px-5 py-2 font-bold text-base">🔄 重来</button>
      <button id="back-btn" class="control-btn px-5 py-2 font-bold text-base">🏠 返回</button>
    </div>

    <!-- 移动端虚拟方向键 -->
    <div id="mobile-controls" class="md:hidden mt-1">
      <div class="dpad-container">
        <button class="dpad-btn dpad-up" data-dir="up">▲</button>
        <button class="dpad-btn dpad-left" data-dir="left">◀</button>
        <button class="dpad-btn dpad-center">🐍</button>
        <button class="dpad-btn dpad-right" data-dir="right">▶</button>
        <button class="dpad-btn dpad-down" data-dir="down">▼</button>
      </div>
    </div>
  </div>

  <!-- 游戏结束弹窗 -->
  <div id="gameover-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="gameover-panel p-8 max-w-sm w-full mx-4 text-center flex flex-col items-center gap-4">
      <div class="arcade-stripe w-full"></div>
      <div class="text-5xl animate-bounce-slow">💀</div>
      <h2 class="text-2xl font-black">游戏结束</h2>
      <div class="pixel-divider w-full"></div>
      <div class="w-full p-4 space-y-3" style="background: #C84C0C; border: 3px solid #8C3800;">
        <div class="flex justify-between items-center">
          <span style="color: #E8A060;">🪙 得分</span>
          <span class="text-xl font-black neon-text-yellow" id="final-score">0</span>
        </div>
        <div class="flex justify-between items-center">
          <span style="color: #E8A060;">📏 长度</span>
          <span class="text-xl font-black neon-text-cyan" id="final-length">3</span>
        </div>
        <div class="flex justify-between items-center">
          <span style="color: #E8A060;">🏆 最佳</span>
          <span class="text-xl font-black neon-text-pink" id="best-score">0</span>
        </div>
      </div>
      <div class="flex gap-3 w-full mt-2">
        <button id="retry-btn" class="flex-1 py-3 font-bold text-base start-btn">🔄 再来一局</button>
        <button id="home-btn" class="flex-1 py-3 font-bold text-base control-btn">🏠 返回首页</button>
      </div>
      <div class="arcade-stripe w-full"></div>
    </div>
  </div>

  <!-- 背景装饰 -->
  <div class="bg-decoration" aria-hidden="true">
    <div class="bg-stars"></div>
    <div class="bg-grid"></div>
    <div class="bg-scanlines"></div>
  </div>

  <!-- 页脚 -->
  <footer class="fixed bottom-2 left-0 right-0 text-center z-10">
  </footer>

  <script type="module" src="main.js"></script>
</body>
</html>
